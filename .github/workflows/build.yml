name: "Build Plugin"

on:
  push:
    branches:
      - "*"
    paths-ignore:
      - "**/README.md"
      - "docs/**"
      - "images/**"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Checkout segment editor
        uses: actions/checkout@v6
        with:
          repository: intro-skipper/segment-editor
          ref: master
          path: segment-editor

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"
          cache-dependency-path: "segment-editor/pnpm-lock.yaml"

      - name: Build segment editor plugin assets
        working-directory: ./segment-editor
        run: |
          pnpm install --frozen-lockfile
          pnpm build:plugin

      - name: Sync plugin assets
        run: |
          rm -rf ./SegmentEditorPlugin/dist/assets
          mkdir -p ./SegmentEditorPlugin/dist/assets
          cp ./segment-editor/dist-plugin/index.html ./SegmentEditorPlugin/dist/index.html
          cp ./segment-editor/dist-plugin/favicon.png ./SegmentEditorPlugin/dist/favicon.png
          cp -R ./segment-editor/dist-plugin/assets/. ./SegmentEditorPlugin/dist/assets/

      - name: Update configPage.html with build output links
        shell: python3 {0}
        run: |
          import re
          from pathlib import Path

          dist_html = Path("./SegmentEditorPlugin/dist/index.html").read_text()
          config_path = Path("./SegmentEditorPlugin/Configuration/configPage.html")
          config_html = config_path.read_text()

          # Extract <script> and <link> tags from dist index.html (top-level, not inline)
          tags = re.findall(r'^\s*(<(?:script\b[^>]*src=|link\b)[^>]*>(?:</script>)?)', dist_html, re.MULTILINE)
          new_tags = "\n".join("        " + tag.strip() for tag in tags)

          # Replace the block between </div> (end of data-role content) and </div> (end of #SegmentEditor)
          # Pattern: match from after "</div>\n" (line 102) through all script/link lines up to the final "    </div>"
          config_html = re.sub(
              r'(</div>\n)(        <script\b.*?<link\b[^>]*>)\n(    </div>)',
              r'\1' + new_tags + r'\n\3',
              config_html,
              count=1,
              flags=re.DOTALL,
          )

          config_path.write_text(config_html)

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore SegmentEditorPlugin.sln

      - name: Build
        run: dotnet build SegmentEditorPlugin.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal

      - name: Retrieve commit identification
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "GIT_HASH=${GIT_HASH}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: SegmentEditorPlugin-${{ env.GIT_HASH }}.dll
          path: SegmentEditorPlugin/bin/Release/net9.0/SegmentEditorPlugin.dll
          if-no-files-found: error
